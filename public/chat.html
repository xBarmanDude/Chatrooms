<!DOCTYPE html>
<html>
<head>
    <title>Chat Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="appContainer">

    <div id="sidebar">
        <div id="sidebarHeader">💬 Chat Rooms</div>
        <div class="sidebarItem active" onclick="switchToGeneral()">🌐 General</div>
        <div id="sidebarHeader2">💌 Direct Messages</div>
        <div id="userList"></div>
        <div id="logoutBtn" onclick="window.location.href='/logout'">🚪 Logout</div>
    </div>

    <div id="main">
        <div id="chatHeader">🌐 General</div>
        <div id="chat"></div>

        <div id="inputBox">

            <!-- FILE INPUT -->
            <input type="file" id="imageInput" accept="image/*,video/*" style="display:none">

            <!-- ATTACH BUTTON -->
            <button class="attachBtn" onclick="document.getElementById('imageInput').click()">
                📎
            </button>

            <!-- TEXT INPUT -->
            <input id="msg" placeholder="Type message..."
                onkeydown="if(event.key==='Enter') sendMessage()">

            <!-- SEND BUTTON -->
            <button class="sendBtn" onclick="sendMessage()">➤</button>
        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = "";
let currentRoom = "general";
let isDM = false;
let dmTarget = "";
let lastDateLabel = "";
let unreadCounts = {};
let onlineUsers = [];
let lastSeenData = {};

// ---------------- INIT ----------------
fetch("/session")
.then(r => r.json())
.then(data => {
    username = data.username;
    socket.emit("userOnline", username);
    socket.emit("joinRoom", currentRoom);
    loadUsers();
});

// ---------------- USERS ----------------
function loadUsers() {
    fetch("/users")
    .then(r => r.json())
    .then(users => {
        const list = document.getElementById("userList");
        list.innerHTML = "";

        users.forEach(u => {
            const div = document.createElement("div");
            div.classList.add("sidebarItem");

            const isOnline = onlineUsers.includes(u.username);

            let statusText = "Online";

            if (!isOnline && lastSeenData[u.username]) {
                const mins = Math.floor((Date.now() - lastSeenData[u.username]) / 60000);
                statusText =
                    mins < 1 ? "Last seen just now" :
                    mins === 1 ? "Last seen 1 minute ago" :
                    `Last seen ${mins} minutes ago`;
            }

            div.innerHTML = `
                <div>
                    <div>${isOnline ? "🟢" : "⚫"} ${u.username}</div>
                    <div style="font-size:11px;color:rgba(255,255,255,0.45)">
                        ${statusText}
                    </div>
                </div>
                <span class="unreadBadge" id="badge-${u.username}" style="display:none">0</span>
            `;

            div.onclick = () => openDM(u.username, div);
            list.appendChild(div);
        });
    });
}

// ---------------- ONLINE USERS ----------------
socket.on("onlineUsers", (users) => {
    onlineUsers = users;
    socket.emit("getLastSeen");
    loadUsers();
});

// ---------------- UPLOAD FIX (IMPORTANT PART) ----------------
document.getElementById("imageInput").addEventListener("change", async function () {
    try {
        const file = this.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!data.success) {
            alert("Upload failed");
            return;
        }

        const msgObj = {
            from: username,
            to: dmTarget,
            name: username,
            room: currentRoom,
            msg: data.url
        };

        if (isDM) socket.emit("dm", msgObj);
        else socket.emit("message", msgObj);

    } catch (err) {
        console.log("UPLOAD ERROR:", err);
    }

    this.value = "";
});

// ---------------- RENDER MESSAGE ----------------
function renderMessage(name, msg, isMe, time, id) {
    time = time || new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const div = document.createElement("div");
    div.setAttribute("data-id", id || "");

    const isCloudinary = msg.includes("cloudinary.com");
    const isImage = isCloudinary && msg.includes("/image/upload/");
    const isVideo = isCloudinary && msg.includes("/video/upload/");

    const deleteBtn = isMe
        ? `<button class="deleteBtn" onclick="deleteMessage('${id}', this)">🗑️</button>`
        : "";

    const copyBtn = `<button class="copyBtn" onclick="copyMessage(this)">📋</button>`;

    const content =
        isImage ? `<img src="${msg}" style="max-width:300px;border-radius:12px;">`
        : isVideo ? `<video controls style="max-width:300px;border-radius:12px;">
                        <source src="${msg}">
                     </video>`
        : `<div class="text">${msg}</div>`;

    if (isMe) {
        div.classList.add("messageWrapper", "meWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="msgActions meActions">${copyBtn}${deleteBtn}</div>
                <div class="bubbleCol">
                    <div class="mySender">You</div>
                    <div class="msg me">${content}</div>
                    <div class="myTime">${time}</div>
                </div>
            </div>
        `;
    } else {
        div.classList.add("messageWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="bubbleCol">
                    <div class="sender">${name}</div>
                    <div class="msg">${content}</div>
                    <div class="time">${time}</div>
                </div>
                <div class="msgActions themActions">${copyBtn}</div>
            </div>
        `;
    }

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

// ---------------- COPY FIX ----------------
function copyMessage(btn) {
    const row = btn.closest(".msgRow");
    const text = row.querySelector(".text")?.innerText || "";
    navigator.clipboard.writeText(text);
}

// ---------------- SEND TEXT ----------------
function sendMessage() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;

    const msgObj = {
        name: username,
        msg: input.value,
        room: currentRoom,
        from: username,
        to: dmTarget
    };

    renderMessage(username, input.value, true);

    if (isDM) socket.emit("dm", msgObj);
    else socket.emit("message", msgObj);

    input.value = "";
}
</script>
</body>
</html>
