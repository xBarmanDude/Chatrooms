<!DOCTYPE html>
<html>
<head>
    <title>Chat Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="appContainer">
    <div id="sidebar">
        <div id="sidebarHeader">💬 Chat Rooms</div>
        <div class="sidebarItem active" onclick="switchToGeneral()">🌐 General</div>
        <div id="sidebarHeader2">💌 Direct Messages</div>
        <div id="userList"></div>
        <div id="logoutBtn" onclick="window.location.href='/logout'">🚪 Logout</div>
    </div>
    <div id="main">

        <div id="callUI" style="display:none; position:fixed; bottom:20px; right:20px; background:#111; padding:10px; border-radius:12px;">
    
    <div style="color:white; font-size:12px; margin-bottom:5px;">
        🔴 In Call
    </div>

    <video id="remoteVideo" autoplay playsinline
    style="width:200px; border-radius:10px; background:black; margin-top:10px;">
</video>
<button onclick="endCall()" style="margin-top:10px; width:100%; padding:5px; border-radius:8px; border:none; background:red; color:white;">
    End Call
</button>

</div>

        <div id="callPopup" style="display:none; position:fixed; top:20px; right:20px; background:#222; padding:15px; border-radius:10px; color:white; z-index:9999;">
    <div id="callText">Incoming call...</div>
    <button onclick="acceptCall()">Accept</button>
    <button onclick="rejectCall()">Reject</button>
</div>

        <div id="chatHeader">🌐 General</div>
        <div id="chat"></div>
        <div id="inputBox">

    <input
    type="file"
    id="imageInput"
    accept="image/*,video/*"
    style="display:none"
>

    <button class="attachBtn" onclick="document.getElementById('imageInput').click()">
    📎
</button>

    <input id="msg" placeholder="Type message..." onkeydown="if(event.key==='Enter') sendMessage()">

    <button class="callBtn" onclick="startCall()">
    📞
    </button>

    <button class="sendBtn" onclick="sendMessage()">
        ➤
    </button>
    
</div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let username = "";
let currentRoom = "general";
let isDM = false;
let dmTarget = "";
let lastDateLabel = "";
let unreadCounts = {};
let onlineUsers = [];
let lastSeenData = {};
let peer;

fetch("/session")
    .then(r => r.json())
    .then(data => {
    username = data.username;

    socket.emit("userOnline", username);

    socket.emit("joinRoom", currentRoom);
    loadUsers();
});

function loadUsers() {
    fetch("/users")
        .then(r => r.json())
        .then(users => {
            const list = document.getElementById("userList");
            list.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement("div");
                div.classList.add("sidebarItem");
                div.id = "dm-" + u.username;
                const isOnline = onlineUsers.includes(u.username);

let statusText = "Online";

if (!isOnline && lastSeenData[u.username]) {
    const last = new Date(lastSeenData[u.username]).getTime();
const mins = Math.floor((Date.now() - last) / 60000);

    if (!last || isNaN(last)) {
    statusText = "Last seen recently";
} else {
    const mins = Math.floor((Date.now() - last) / 60000);

    if (mins < 1) {
        statusText = "Last seen just now";
    } else if (mins === 1) {
        statusText = "Last seen 1 minute ago";
    } else {
        statusText = `Last seen ${mins} minutes ago`;
    }
}
}

div.innerHTML = `
<div>
    <div>${isOnline ? "🟢" : "⚫"} ${u.username}</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.45)">
        ${statusText}
    </div>
</div>

<span class="unreadBadge" id="badge-${u.username}" style="display:none">0</span>
`;
                div.onclick = () => openDM(u.username, div);
                list.appendChild(div);
            });
        });
}

socket.on("onlineUsers", (users) => {
    onlineUsers = users;

    socket.emit("getLastSeen");

    loadUsers();
});

function switchToGeneral() {
    isDM = false;
    dmTarget = "";
    currentRoom = "general";
    lastDateLabel = "";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatHeader").innerText = "🌐 General";
    document.querySelectorAll(".sidebarItem").forEach(i => i.classList.remove("active"));
    document.querySelector(".sidebarItem").classList.add("active");
    socket.emit("joinRoom", currentRoom);
}

function openDM(target, el) {
    isDM = true;
    dmTarget = target;
    lastDateLabel = "";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatHeader").innerText = "💌 " + target;
    document.querySelectorAll(".sidebarItem").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
    // clear unread
    unreadCounts[target] = 0;
    const badge = document.getElementById("badge-" + target);
    if (badge) badge.style.display = "none";
    socket.emit("joinDM", { from: username, to: target });
}

function getDateLabel(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { month: "long", day: "numeric", year: "numeric" });
}

function insertDateDivider(dateLabel) {
    if (dateLabel === lastDateLabel) return;
    lastDateLabel = dateLabel;
    const div = document.createElement("div");
    div.classList.add("dateDivider");
    div.innerHTML = `<span>${dateLabel}</span>`;
    document.getElementById("chat").appendChild(div);
}

socket.on("loadMessages", (messages) => {
    document.getElementById("chat").innerHTML = "";
    lastDateLabel = "";
    messages.forEach((data) => {
        const t = new Date(data.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const dateLabel = getDateLabel(data.time);
        insertDateDivider(dateLabel);
        renderMessage(data.name, data.msg, data.name === username, t, data._id);
    });
});

socket.on("lastSeenData", (data) => {
    lastSeenData = data;
    loadUsers();
});

socket.on("message", (data) => {
    if (data.senderId !== socket.id) {
        const now = new Date();
        const dateLabel = getDateLabel(now);
        insertDateDivider(dateLabel);
        renderMessage(data.name, data.msg, false);

        // unread badge for DMs
        if (isDM && dmTarget !== data.name) {
            unreadCounts[data.name] = (unreadCounts[data.name] || 0) + 1;
            const badge = document.getElementById("badge-" + data.name);
            if (badge) {
                badge.innerText = unreadCounts[data.name];
                badge.style.display = "inline-block";
            }
        } else if (!isDM && data.room !== "general") {
            // DM received while in general
            unreadCounts[data.name] = (unreadCounts[data.name] || 0) + 1;
            const badge = document.getElementById("badge-" + data.name);
            if (badge) {
                badge.innerText = unreadCounts[data.name];
                badge.style.display = "inline-block";
            }
        }
    }
});

function renderMessage(name, msg, isMe, time, id) {
    time = time || new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const div = document.createElement("div");
    div.setAttribute("data-id", id || "");

    const isCloudinary = msg.includes("cloudinary.com");

const isImage = isCloudinary && msg.includes("/image/upload/");
const isVideo = isCloudinary && msg.includes("/video/upload/");

    const deleteBtn = isMe ? `<button class="deleteBtn" onclick="deleteMessage('${id}', this)">🗑️</button>` : "";
    const copyBtn = `<button class="copyBtn" onclick="copyMessage(this)">📋</button>`;

    if (isMe) {
        div.classList.add("messageWrapper", "meWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="msgActions meActions">${copyBtn}${deleteBtn}</div>
                <div class="bubbleCol">
                    <div class="mySender">You</div>
                    <div class="msg me">${
    isImage
        ? `<img src="${msg}" style="max-width:300px;border-radius:12px;">`
        : isVideo
            ? `
                <video controls style="max-width:300px;border-radius:12px;">
                    <source src="${msg}">
                </video>
              `
            : `<div class="text">${msg}</div>`
}</div>
                    <div class="myTime">${time}</div>
                </div>
            </div>
        `;
    } else {
        div.classList.add("messageWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="bubbleCol">
                    <div class="sender">${name}</div>
                    <div class="msg">${
    isImage
        ? `<img src="${msg}" style="max-width:300px;border-radius:12px;">`
        : isVideo
            ? `
                <video controls style="max-width:300px;border-radius:12px;">
                    <source src="${msg}">
                </video>
              `
            : `<div class="text">${msg}</div>`
}</div>
                    <div class="time">${time}</div>
                </div>
                <div class="msgActions themActions">${copyBtn}</div>
            </div>
        `;
    }
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function deleteMessage(id, btn) {
    const wrapper = btn.closest(".messageWrapper");
    wrapper.remove();
    socket.emit("deleteMessage", { id });
}

function copyMessage(btn) {
    const row = btn.closest(".msgRow");
    const text = row.querySelector(".text").innerText;
    navigator.clipboard.writeText(text);
}

socket.on("messageDeleted", (data) => {
    const el = document.querySelector(`[data-id="${data.id}"]`);
    if (el) el.remove();
});

function sendMessage() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    const now = new Date();
    const dateLabel = getDateLabel(now);
    insertDateDivider(dateLabel);
    renderMessage(username, input.value, true);
    if (isDM) {
        socket.emit("dm", { from: username, to: dmTarget, msg: input.value });
    } else {
        socket.emit("message", { name: username, msg: input.value, room: currentRoom });
    }
    input.value = "";
}

function startCall() {
    if (!isDM || !dmTarget) {
        alert("Open a DM first to call");
        return;
    }

    alert("Calling " + dmTarget );
    
    socket.emit("call-user", {
        to: dmTarget,
        from: username,
        offer: null
    });
}

socket.on("incoming-call", async (data) => {
    window.currentCaller = data.from;

    document.getElementById("callText").innerText =
        "Incoming call from " + data.from;

    document.getElementById("callPopup").style.display = "block";

    window.incomingOffer = data.offer;
});

socket.on("call-accepted", async () => {
    createPeer();

    const offer = window.incomingOffer;

    await peer.setRemoteDescription(new RTCSessionDescription(offer));

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("call-user", {
        to: window.currentCaller,
        from: username,
        offer: answer
    });
});

socket.on("ice-candidate", async ({ candidate }) => {
    try {
        if (peer && candidate) {
            await peer.addIceCandidate(new RTCIceCandidate(candidate));
        }
    } catch (e) {
        console.log("ICE error:", e);
    }
});

async function acceptCall() {
    socket.emit("call-accepted", {
        to: window.currentCaller,
        answer: "accepted"
    });

    document.getElementById("callPopup").style.display = "none";

    await openCamera();

if (!window.localStream) {
    console.log("No stream, stopping call setup");
    return;
}

createPeer();

    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.emit("call-user", {
        to: window.currentCaller,
        from: username,
        offer: offer
    });
}

function rejectCall() {
    socket.emit("end-call", {
        to: window.currentCaller
    });

    document.getElementById("callPopup").style.display = "none";
}

async function openCamera() {
    try {
        const video = document.getElementById("localVideo");

        if (!video) {
            console.log("localVideo not found in DOM");
            return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        video.srcObject = stream;
        window.localStream = stream;

        document.getElementById("callUI").style.display = "block";

        console.log("Camera opened");
    } catch (err) {
        console.log("Camera error:", err);
        alert("Camera failed (check permissions or HTTPS)");
    }
}

function endCall() {
    socket.emit("end-call", {
        to: window.currentCaller
    });

    cleanupCall();
}

function cleanupCall() {
    if (peer) {
        peer.close();
        peer = null;
    }

    if (window.localStream) {
        window.localStream.getTracks().forEach(track => track.stop());
        window.localStream = null;
    }

    document.getElementById("localVideo").srcObject = null;
    document.getElementById("remoteVideo").srcObject = null;

    document.getElementById("callUI").style.display = "none";
}

socket.on("call-ended", () => {
    cleanupCall();
});

function createPeer() {
    peer = new RTCPeerConnection({
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" }
        ]
    });

    // send local tracks
    if (!window.localStream) {
    console.log("No localStream yet");
    return;
}

window.localStream.getTracks().forEach(track => {
        peer.addTrack(track, window.localStream);
    });

    // receive remote stream
    peer.ontrack = (event) => {
        document.getElementById("remoteVideo").srcObject = event.streams[0];
    };

    // ICE candidates
    peer.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("ice-candidate", {
                to: window.currentCaller,
                candidate: event.candidate
            });
        }
    };
}

document.getElementById("imageInput").addEventListener("change", async function () {
    try {
        const file = this.files[0];
        if (!file) {
            console.log("No file selected");
            return;
        }

        console.log("Uploading:", file.name);

        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        console.log("Upload HTTP status:", res.status);

        const data = await res.json();
        console.log("Upload response:", data);

        if (!data.success) {
            alert("Upload failed (server rejected)");
            return;
        }

        const msg = data.url;
        renderMessage(username, msg, true, null, null);

        // send message (IMPORTANT FIX: include senderId safety)
        if (isDM) {
            socket.emit("dm", {
                from: username,
                to: dmTarget,
                msg: msg
            });
        } else {
            socket.emit("message", {
                name: username,
                msg: msg,
                room: currentRoom
            });
        }

    } catch (err) {
        console.log("UPLOAD ERROR:", err);
        alert("Upload crashed — check console");
    }

    this.value = "";
});

</script>
</body>
</html>
