<!DOCTYPE html>
<html>
<head>
    <title>Chat Rooms</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="appContainer">
    <div id="sidebar">
        <div id="sidebarTop">
            <div id="sidebarHeader">💬 Chatrooms</div>
        </div>
        <div class="sectionLabel">CHANNELS</div>
        <div class="sidebarItem active" onclick="switchToGeneral()">
            <span class="itemIcon">🌐</span>
            <span class="itemLabel">General</span>
        </div>
        <div class="sectionLabel">DIRECT MESSAGES</div>
        <div id="userList"></div>
        <div id="sidebarBottom">
            <div id="logoutBtn" onclick="window.location.href='/logout'">
                <span>🚪</span> Logout
            </div>
        </div>
    </div>

    <div id="main">
        <div id="chatHeader">
            <div id="chatHeaderLeft">
                <div id="chatHeaderName">🌐 General</div>
                <div id="chatHeaderStatus"></div>
            </div>
            <div id="chatHeaderRight">
                <button class="headerBtn" onclick="startJitsiCall()" title="Video Call">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
                </button>
            </div>
        </div>
        <div id="chat"></div>
        <div id="inputArea">
            <div id="inputBox">
                <input type="file" id="imageInput" style="display:none">
                <button class="attachBtn" onclick="document.getElementById('imageInput').click()" title="Attach file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input id="msg" placeholder="Message..."
                    oninput="socket.emit('typing', { to: dmTarget })"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
                <button class="sendBtn" onclick="sendMessage()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="callPopup">
    <div id="callPopupInner">
        <div id="callAvatar">👤</div>
        <div id="callText">Incoming call...</div>
        <div id="callPopupBtns">
            <button class="rejectBtn" onclick="document.getElementById('callPopup').style.display='none'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            </button>
            <button class="acceptBtn" onclick="acceptJitsiCall()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let username = "";
let currentRoom = "general";
let isDM = false;
let dmTarget = "";
let lastDateLabel = "";
let unreadCounts = {};
let onlineUsers = [];
let lastSeenData = {};
let pendingJitsiRoom = null;

fetch("/session")
    .then(r => r.json())
    .then(data => {
        username = data.username;
        socket.emit("userOnline", username);
        currentRoom = "general";
        socket.emit("joinRoom", currentRoom);
        loadUsers();
    });

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
}

function loadUsers() {
    fetch("/users")
        .then(r => r.json())
        .then(users => {
            const list = document.getElementById("userList");
            list.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement("div");
                div.classList.add("sidebarItem");
                div.id = "dm-" + u.username;
                const isOnline = onlineUsers.includes(u.username);
                let statusText = isOnline ? "Online" : formatLastSeen(lastSeenData[u.username]);
                const initials = u.username.slice(0, 2).toUpperCase();
                div.innerHTML = `
                    <div class="dmAvatar ${isOnline ? 'online' : ''}">${initials}</div>
                    <div class="dmInfo">
                        <div class="dmName">${u.username}</div>
                        <div class="dmStatus">${statusText}</div>
                    </div>
                    <span class="unreadBadge" id="badge-${u.username}" style="display:none">0</span>
                `;
                div.onclick = () => openDM(u.username, div);
                list.appendChild(div);
            });
        });
}

socket.on("onlineUsers", (users) => {
    onlineUsers = users;
    socket.emit("getLastSeen");
    loadUsers();
});

socket.on("lastSeenData", (data) => {
    lastSeenData = data;
    loadUsers();
});

function formatLastSeen(dateStr) {
    if (!dateStr) return "Offline";
    const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
    if (diff < 60) return "Just now";
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
}

function switchToGeneral() {
    isDM = false; dmTarget = ""; currentRoom = "general"; lastDateLabel = "";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatHeaderName").innerText = "🌐 General";
    document.getElementById("chatHeaderStatus").innerText = "";
    document.querySelectorAll(".sidebarItem").forEach(i => i.classList.remove("active"));
    document.querySelector(".sidebarItem").classList.add("active");
    socket.emit("joinRoom", currentRoom);
}

function openDM(target, el) {
    isDM = true; dmTarget = target; lastDateLabel = "";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatHeaderName").innerText = target;
    const isOnline = onlineUsers.includes(target);
    document.getElementById("chatHeaderStatus").innerText = isOnline ? "🟢 Online" : "Offline";
    document.querySelectorAll(".sidebarItem").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
    unreadCounts[target] = 0;
    const badge = document.getElementById("badge-" + target);
    if (badge) badge.style.display = "none";
    socket.emit("joinDM", { from: username, to: target });
}

function getDateLabel(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { month: "long", day: "numeric", year: "numeric" });
}

function insertDateDivider(dateLabel) {
    if (dateLabel === lastDateLabel) return;
    lastDateLabel = dateLabel;
    const div = document.createElement("div");
    div.classList.add("dateDivider");
    div.innerHTML = `<span>${dateLabel}</span>`;
    document.getElementById("chat").appendChild(div);
}

socket.on("loadMessages", (messages) => {
    document.getElementById("chat").innerHTML = "";
    lastDateLabel = "";
    messages.forEach((data) => {
        const t = new Date(data.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        insertDateDivider(getDateLabel(data.time));
        renderMessage(data.name, data.msg, data.name === username, t, data._id);
    });
});

socket.on("message", (data) => {
    if (document.querySelector(`[data-id="${data._id}"]`)) return;
    const inDM = data.isDM;
    if (inDM && (!isDM || (dmTarget !== data.name && dmTarget !== data.to))) {
        unreadCounts[data.name] = (unreadCounts[data.name] || 0) + 1;
        const badge = document.getElementById("badge-" + data.name);
        if (badge) { badge.innerText = unreadCounts[data.name]; badge.style.display = "inline-flex"; }
        return;
    }
    if (!inDM && currentRoom !== data.room) return;
    insertDateDivider(getDateLabel(data.time || new Date()));
    renderMessage(data.name, data.msg, data.name === username, null, data._id);
});

function renderMessage(name, msg, isMe, time, id) {
    time = time || new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const div = document.createElement("div");
    div.setAttribute("data-id", id || "");

    // Cloudinary path classification
    const isImage = msg.includes("cloudinary.com") && msg.includes("/image/upload/");
    const isVideo = msg.includes("cloudinary.com") && msg.includes("/video/upload/");
    const isDoc = msg.includes("cloudinary.com") && msg.includes("/raw/upload/");

    const deleteBtn = isMe ? `<button class="actionBtn deleteBtn" onclick="deleteMessage('${id}', this)" title="Delete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>` : "";
    
    const copyBtn = (!isImage && !isVideo && !isDoc) ? `<button class="actionBtn copyBtn" onclick="copyMessage(this)" title="Copy">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    </button>` : "";

    let mediaContent = "";
    let bubbleClass = "msg"; 

    if (isImage) {
        mediaContent = `<img src="${msg}" style="max-width:280px;border-radius:12px;display:block;margin-top:4px;">`;
        bubbleClass = "msg msg-media-wrapper"; 
    } else if (isVideo) {
        mediaContent = `<video controls style="max-width:280px;border-radius:12px;display:block;margin-top:4px;"><source src="${msg}"></video>`;
        bubbleClass = "msg msg-media-wrapper"; 
    } else if (isDoc) {
        // Extract filename and determine layout rule
        const rawName = msg.split('/').pop();
        const fileName = rawName.substring(rawName.indexOf('_') + 1); // Strips unique Cloudinary prefixes if present
        
        mediaContent = `
            <a href="${msg}" target="_blank" class="doc-card">
                <div class="doc-icon-frame">📄</div>
                <div class="doc-meta">
                    <div class="doc-name">${fileName}</div>
                    <div class="doc-desc">Click to view/download</div>
                </div>
            </a>`;
        bubbleClass = "msg msg-media-wrapper"; 
    } else {
        mediaContent = `<div class="text">${msg}</div>`;
    }

    const initials = name.slice(0, 2).toUpperCase();

    if (isMe) {
        div.classList.add("messageWrapper", "meWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="msgActions meActions">${copyBtn}${deleteBtn}</div>
                <div class="bubbleCol">
                    <div class="${bubbleClass} me">${mediaContent}<span class="msgTime">${time}</span></div>
                </div>
            </div>`;
    } else {
        div.classList.add("messageWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="avatarCircle">${initials}</div>
                <div class="bubbleCol">
                    <div class="senderName">${name}</div>
                    <div class="${bubbleClass}">${mediaContent}<span class="msgTime">${time}</span></div>
                </div>
                <div class="msgActions themActions">${copyBtn}</div>
            </div>`;
    }
    
    const chat = document.getElementById("chat");
    const isAtBottom = chat.scrollHeight - chat.scrollTop <= chat.clientHeight + 120;
    chat.appendChild(div);
    if (isAtBottom || isMe) chat.scrollTop = chat.scrollHeight;
}

function deleteMessage(id, btn) {
    const wrapper = btn.closest(".messageWrapper");
    wrapper.style.opacity = "0";
    wrapper.style.transform = "scale(0.95)";
    setTimeout(() => wrapper.remove(), 200);
    socket.emit("deleteMessage", { id });
}

function copyMessage(btn) {
    const text = btn.closest(".msgRow").querySelector(".text")?.innerText;
    if (text) { navigator.clipboard.writeText(text); showToast("Copied!"); }
}

socket.on("messageDeleted", (data) => {
    const el = document.querySelector(`[data-id="${data.id}"]`);
    if (el) { el.style.opacity = "0"; setTimeout(() => el.remove(), 200); }
});

function sendMessage() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    if (isDM) socket.emit("dm", { from: username, to: dmTarget, msg: input.value });
    else socket.emit("message", { name: username, msg: input.value, room: currentRoom });
    input.value = "";
}

document.getElementById("imageInput").addEventListener("change", async function () {
    const file = this.files[0];
    if (!file) return;
    showToast("Uploading...");
    const formData = new FormData();
    formData.append("image", file);
    try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        if (!data.success) { showToast("Upload failed"); return; }
        if (isDM) socket.emit("dm", { from: username, to: dmTarget, msg: data.url });
        else socket.emit("message", { name: username, msg: data.url, room: currentRoom });
        showToast("Uploaded!");
    } catch (err) { showToast("Upload error"); }
    this.value = "";
});

// ── JITSI CALLS ──
function startJitsiCall() {
    if (!isDM || !dmTarget) { showToast("Open a DM first"); return; }
    const roomName = ["chatapp", username, dmTarget].sort().join("-");
    socket.emit("call-invite", { to: dmTarget, from: username, room: roomName });
    window.open(`https://meet.jit.si/${roomName}`, "_blank");
    showToast("Call started — waiting for " + dmTarget);
}

socket.on("call-invite", ({ from, room }) => {
    pendingJitsiRoom = room;
    document.getElementById("callText").innerText = `📞 ${from} is calling...`;
    document.getElementById("callPopup").style.display = "flex";
});

function acceptJitsiCall() {
    document.getElementById("callPopup").style.display = "none";
    if (pendingJitsiRoom) window.open(`https://meet.jit.si/${pendingJitsiRoom}`, "_blank");
}

// ── TYPING ──
let typingTimeout;
socket.on("userTyping", (data) => {
    if (isDM && dmTarget === data.from) {
        document.getElementById("chatHeaderStatus").innerText = "typing...";
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            const isOnline = onlineUsers.includes(dmTarget);
            document.getElementById("chatHeaderStatus").innerText = isOnline ? "🟢 Online" : "Offline";
        }, 2000);
    }
});
</script>
</body>
</html>
