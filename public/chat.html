<!DOCTYPE html>
<html>
<head>
    <title>Chat Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="appContainer">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sidebarHeader">💬 Chat Rooms</div>
        <div class="sidebarItem active" onclick="switchToGeneral()">🌐 General</div>
        <div id="sidebarHeader2">💌 Direct Messages</div>
        <div id="userList"></div>
        <div id="logoutBtn" onclick="window.location.href='/logout'">🚪 Logout</div>
    </div>

    <!-- MAIN -->
    <div id="main">
        <div id="chatHeader">🌐 General</div>
        <div id="chat"></div>
        <div id="inputBox">
            <input type="file" id="imageInput" accept="image/*,video/*" style="display:none">
            <button class="attachBtn" onclick="document.getElementById('imageInput').click()">📎</button>
            <input id="msg" placeholder="Type message..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="callBtn" onclick="startJitsiCall()" title="Start video call">📞</button>
            <button class="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<!-- INCOMING CALL POPUP -->
<div id="callPopup">
    <div id="callText">Incoming call...</div>
    <div id="callPopupBtns">
        <button class="acceptBtn" onclick="acceptCall()">✅ Accept</button>
        <button class="rejectBtn" onclick="rejectCall()">❌ Reject</button>
    </div>
</div>

<!-- CALL UI -->
<div id="callUI">
    <div id="callUIHeader">
        <span id="callUILabel">📹 In Call</span>
        <button class="endCallBtn" onclick="endCall()">End Call</button>
    </div>
    <div id="videoContainer">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://meet.jit.si/external_api.js"></script>
<script>
const socket = io();
let username = "";
let currentRoom = "general";
let isDM = false;
let dmTarget = "";
let lastDateLabel = "";
let unreadCounts = {};
let onlineUsers = [];
let lastSeenData = {};
let pendingCandidates = [];

// ── CALL STATE ──
let peer = null;
let localStream = null;
let currentCallTargetSocketId = "";

fetch("/session")
    .then(r => r.json())
    .then(data => {
        username = data.username;
        socket.emit("userOnline", username);
        socket.emit("joinRoom", currentRoom);
        loadUsers();
    });

// ── USERS ──
function loadUsers() {
    fetch("/users")
        .then(r => r.json())
        .then(users => {
            const list = document.getElementById("userList");
            list.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement("div");
                div.classList.add("sidebarItem");
                div.id = "dm-" + u.username;
                const isOnline = onlineUsers.includes(u.username);
                let statusText = isOnline ? "Online" : "Offline";
                if (!isOnline && lastSeenData[u.username]) {
                    const mins = Math.floor((Date.now() - new Date(lastSeenData[u.username]).getTime()) / 60000);
                    statusText = mins < 1 ? "Last seen just now" : mins === 1 ? "Last seen 1 min ago" : `Last seen ${mins} mins ago`;
                }
                div.innerHTML = `
                    <div>
                        <div>${isOnline ? "🟢" : "⚫"} ${u.username}</div>
                        <div class="statusText">${statusText}</div>
                    </div>
                    <span class="unreadBadge" id="badge-${u.username}" style="display:none">0</span>
                `;
                div.onclick = () => openDM(u.username, div);
                list.appendChild(div);
            });
        });
}

socket.on("onlineUsers", (users) => {
    onlineUsers = users;
    socket.emit("getLastSeen");
    loadUsers();
});

socket.on("lastSeenData", (data) => {
    lastSeenData = data;
    loadUsers();
});

// ── NAVIGATION ──
function switchToGeneral() {
    isDM = false;
    dmTarget = "";
    currentRoom = "general";
    lastDateLabel = "";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatHeader").innerText = "🌐 General";
    document.querySelectorAll(".sidebarItem").forEach(i => i.classList.remove("active"));
    document.querySelector(".sidebarItem").classList.add("active");
    socket.emit("joinRoom", currentRoom);
}

function openDM(target, el) {
    isDM = true;
    dmTarget = target;
    lastDateLabel = "";
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatHeader").innerText = "💌 " + target;
    document.querySelectorAll(".sidebarItem").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
    unreadCounts[target] = 0;
    const badge = document.getElementById("badge-" + target);
    if (badge) badge.style.display = "none";
    socket.emit("joinDM", { from: username, to: target });
}

// ── DATE DIVIDERS ──
function getDateLabel(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return "Today";
    if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
    return d.toLocaleDateString([], { month: "long", day: "numeric", year: "numeric" });
}

function insertDateDivider(dateLabel) {
    if (dateLabel === lastDateLabel) return;
    lastDateLabel = dateLabel;
    const div = document.createElement("div");
    div.classList.add("dateDivider");
    div.innerHTML = `<span>${dateLabel}</span>`;
    document.getElementById("chat").appendChild(div);
}

// ── MESSAGES ──
socket.on("loadMessages", (messages) => {
    document.getElementById("chat").innerHTML = "";
    lastDateLabel = "";
    messages.forEach((data) => {
        const t = new Date(data.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        insertDateDivider(getDateLabel(data.time));
        renderMessage(data.name, data.msg, data.name === username, t, data._id);
    });
});

socket.on("message", (data) => {
    if (data.senderId !== socket.id) {
        insertDateDivider(getDateLabel(new Date()));
        renderMessage(data.name, data.msg, false);
        if (isDM && dmTarget !== data.name) {
            unreadCounts[data.name] = (unreadCounts[data.name] || 0) + 1;
            const badge = document.getElementById("badge-" + data.name);
            if (badge) { badge.innerText = unreadCounts[data.name]; badge.style.display = "inline-block"; }
        } else if (!isDM && data.isDM) {
            unreadCounts[data.name] = (unreadCounts[data.name] || 0) + 1;
            const badge = document.getElementById("badge-" + data.name);
            if (badge) { badge.innerText = unreadCounts[data.name]; badge.style.display = "inline-block"; }
        }
    }
});

function renderMessage(name, msg, isMe, time, id) {
    time = time || new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const div = document.createElement("div");
    div.setAttribute("data-id", id || "");

    const isImage = msg.includes("cloudinary.com") && msg.includes("/image/upload/");
    const isVideo = msg.includes("cloudinary.com") && msg.includes("/video/upload/");

    const deleteBtn = isMe ? `<button class="deleteBtn" onclick="deleteMessage('${id}', this)">🗑️</button>` : "";
    const copyBtn = !isImage && !isVideo ? `<button class="copyBtn" onclick="copyMessage(this)">📋</button>` : "";

    const mediaContent = isImage
        ? `<img src="${msg}" style="max-width:280px;border-radius:12px;display:block;">`
        : isVideo
        ? `<video controls style="max-width:280px;border-radius:12px;display:block;"><source src="${msg}"></video>`
        : `<div class="text">${msg}</div>`;

    if (isMe) {
        div.classList.add("messageWrapper", "meWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="msgActions meActions">${copyBtn}${deleteBtn}</div>
                <div class="bubbleCol">
                    <div class="mySender">You</div>
                    <div class="msg me">${mediaContent}</div>
                    <div class="myTime">${time}</div>
                </div>
            </div>`;
    } else {
        div.classList.add("messageWrapper");
        div.innerHTML = `
            <div class="msgRow">
                <div class="bubbleCol">
                    <div class="sender">${name}</div>
                    <div class="msg">${mediaContent}</div>
                    <div class="time">${time}</div>
                </div>
                <div class="msgActions themActions">${copyBtn}</div>
            </div>`;
    }
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function deleteMessage(id, btn) {
    btn.closest(".messageWrapper").remove();
    socket.emit("deleteMessage", { id });
}

function copyMessage(btn) {
    const text = btn.closest(".msgRow").querySelector(".text")?.innerText;
    if (text) navigator.clipboard.writeText(text);
}

socket.on("messageDeleted", (data) => {
    const el = document.querySelector(`[data-id="${data.id}"]`);
    if (el) el.remove();
});

function sendMessage() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;
    insertDateDivider(getDateLabel(new Date()));
    renderMessage(username, input.value, true);
    if (isDM) socket.emit("dm", {
    from: username,
    to: dmTarget,
    msg: input.value
});
    else socket.emit("message", { name: username, msg: input.value, room: currentRoom });
    input.value = "";
}

// ── FILE UPLOAD ──
document.getElementById("imageInput").addEventListener("change", async function () {
    const file = this.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append("image", file);
    try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        if (!data.success) { alert("Upload failed"); return; }
        insertDateDivider(getDateLabel(new Date()));
        renderMessage(username, data.url, true);
        if (isDM) socket.emit("dm", { from: username, to: dmTarget, msg: data.url });
        else socket.emit("message", { name: username, msg: data.url, room: currentRoom });
    } catch (err) {
        alert("Upload error");
    }
    this.value = "";
});

// ── CALL SYSTEM ──
async function startCall() {
    if (!isDM || !dmTarget) {
        alert("Open a DM first to call");
        return;
    }

    if (peer) {
        peer.close();
        peer = null;
    }

    pendingCandidates = [];

    await openCamera();
    if (!localStream) return;

    peer = createPeer();

    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    socket.emit("call-user", {
        to: dmTarget,
        from: username,
        offer,
        fromSocketId: socket.id
    });
}

socket.on("incoming-call", ({ from, offer, fromSocketId }) => {
    currentCallTargetSocketId = fromSocketId;
    window.pendingOffer = offer;
    document.getElementById("callText").innerText = "📞 Incoming call from " + from;
    document.getElementById("callPopup").style.display = "flex";
});

async function acceptCall() {
    document.getElementById("callPopup").style.display = "none";
    if (peer) {
    peer.close();
    peer = null;
}
pendingCandidates = [];
    await openCamera();
    if (!localStream) return;
    peer = createPeer();
    await peer.setRemoteDescription(new RTCSessionDescription(window.pendingOffer));
    // flush queued ICE candidates
for (const c of pendingCandidates) {
    await peer.addIceCandidate(c);
}
pendingCandidates = [];
    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);
    socket.emit("call-accepted", { toSocketId: currentCallTargetSocketId, answer });
}

function rejectCall() {
    document.getElementById("callPopup").style.display = "none";
    socket.emit("end-call", { toSocketId: currentCallTargetSocketId });
}

socket.on("call-accepted", async ({ answer }) => {
    if (peer) await peer.setRemoteDescription(new RTCSessionDescription(answer));
});

socket.on("ice-candidate", async ({ candidate }) => {
    try {
        if (!peer || !candidate) return;

        const ice = new RTCIceCandidate(candidate);

        if (!peer.remoteDescription) {
            pendingCandidates.push(ice);
            return;
        }

        await peer.addIceCandidate(ice);
    } catch (e) {
        console.log("ICE error:", e);
    }
});

socket.on("call-ended", () => cleanupCall());

socket.on("call-target-id", ({ targetSocketId }) => {
    currentCallTargetSocketId = targetSocketId;
});

function createPeer() {
    const pc = new RTCPeerConnection({
    iceTransportPolicy: "relay",
    iceServers: [
  { urls: "stun:stun.relay.metered.ca:80" },

  {
    urls: "turn:global.relay.metered.ca:80",
    username: "701acf6c481f2350081869a7",
    credential: "ASPxdqlRB2ze3o/g"
  },
  {
    urls: "turn:global.relay.metered.ca:80?transport=tcp",
    username: "701acf6c481f2350081869a7",
    credential: "ASPxdqlRB2ze3o/g"
  },
  {
    urls: "turn:global.relay.metered.ca:443",
    username: "701acf6c481f2350081869a7",
    credential: "ASPxdqlRB2ze3o/g"
  },
  {
    urls: "turns:global.relay.metered.ca:443?transport=tcp",
    username: "701acf6c481f2350081869a7",
    credential: "ASPxdqlRB2ze3o/g"
  }
]
    });

    // 👇 ADD THIS (STEP 1 DEBUG ONLY)
    pc.oniceconnectionstatechange = () => {
        console.log("ICE STATE:", pc.iceConnectionState);
    };

    pc.onconnectionstatechange = () => {
        console.log("PC STATE:", pc.connectionState);
    };

    localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
});

    pc.ontrack = (event) => {
    const video = document.getElementById("remoteVideo");
    video.srcObject = event.streams[0];
    video.play().catch(() => {});
};

    pc.onicecandidate = (event) => {
    console.log(
        "ICE GENERATED",
        "TARGET:",
        currentCallTargetSocketId,
        event.candidate
    );

    if (event.candidate) {
        socket.emit("ice-candidate", {
            toSocketId: currentCallTargetSocketId,
            candidate: event.candidate
        });
    }
};
return pc;
}

async function openCamera() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        document.getElementById("callUI").style.display = "flex";
    } catch (err) {
        alert("Camera/mic access failed — make sure you're on HTTPS and permissions are allowed");
        console.log(err);
    }
}

function endCall() {
    socket.emit("end-call", { toSocketId: currentCallTargetSocketId });
    cleanupCall();
}

function startJitsiCall() {
    if (!isDM || !dmTarget) {
        alert("Open a DM first");
        return;
    }

    const roomName = ["chatapp", username, dmTarget]
        .sort()
        .join("-");

    window.open(
        `https://meet.jit.si/${roomName}`,
        "_blank"
    );
}

function cleanupCall() {
    if (peer) { peer.close(); peer = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    document.getElementById("localVideo").srcObject = null;
    document.getElementById("remoteVideo").srcObject = null;
    document.getElementById("callUI").style.display = "none";
    currentCallTargetSocketId = "";
}
</script>
</body>
</html>
