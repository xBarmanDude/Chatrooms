<!DOCTYPE html>
<html>
<head>
    <title>Chat Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>💬 Chat Rooms</h2>

<div id="chat"></div>

<div id="inputBox">
    <input id="msg" placeholder="Type message...">
    <button class="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let username = prompt("Enter your name:");
let currentRoom = "general";

socket.emit("joinRoom", currentRoom);
socket.on("loadMessages", (messages) => {
    messages.forEach((data) => {
        renderMessage(data.name, data.msg, false);
    });
});

function joinRoom() {
    const room = document.getElementById("roomSelect").value;
    currentRoom = room;
    socket.emit("joinRoom", room);
    document.getElementById("chat").innerHTML = "";
}

function renderMessage(name, msg, isMe) {
    const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const div = document.createElement("div");

    if (isMe) {
        div.classList.add("messageWrapper", "meWrapper");
        div.innerHTML = `<div class="mySender">You</div><div class="msg me"><div class="text">${msg}</div></div><div class="myTime">${time}</div>`;
    } else {
        div.classList.add("messageWrapper");
        div.innerHTML = `<div class="sender">${name}</div><div class="msg"><div class="text">${msg}</div></div><div class="time">${time}</div>`;
    }

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

socket.on("message", (data) => {
    // Only render OTHER people's messages here
    if (data.senderId !== socket.id) {
        renderMessage(data.name, data.msg, false);
    }
});

function sendMessage() {
    const input = document.getElementById("msg");
    if (!input.value.trim()) return;

    // Render YOUR message instantly locally
    renderMessage(username, input.value, true);

    socket.emit("message", {
        name: username,
        msg: input.value,
        room: currentRoom
    });

    input.value = "";
}
</script>

</body>
</html>
