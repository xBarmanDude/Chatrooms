<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>💬 Chat Rooms</h2>

<div id="authBox">
    <h3 id="formTitle">Login</h3>
    <input id="username" placeholder="Username" type="text"><br>
    <input id="password" placeholder="Password" type="password"><br>
    <button onclick="submit()">Login</button>
    <p id="error" style="color:red"></p>
    <p>No account? <span onclick="toggleForm()" style="cursor:pointer;color:#00c853">Register</span></p>
</div>

<script>
let isLogin = true;

function toggleForm() {
    isLogin = !isLogin;
    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Register";
    document.querySelector("button").innerText = isLogin ? "Login" : "Register";
    document.querySelector("p:last-child").innerHTML = isLogin
        ? `No account? <span onclick="toggleForm()" style="cursor:pointer;color:#00c853">Register</span>`
        : `Have an account? <span onclick="toggleForm()" style="cursor:pointer;color:#00c853">Login</span>`;
}

async function submit() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    if (!username || !password) return;

    const route = isLogin ? "/login" : "/register";
    const res = await fetch(route, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.error) {
        document.getElementById("error").innerText = data.error;
    } else {
        window.location.href = "/";
    }
}
</script>

</body>
</html>
